<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <button onclick="lambda()">Lambda function</button>
    <script>
        function lambda(){
        const n1 = prompt("Enter a number"); 
         if(parseInt(n1)%2==0){
                console.log(n1 +" is even number");
            }
            else if(parseInt(n1)%2!=0){
                console.log(n1+" is odd number");
            }
            else{
                console.log("Invalid input");
            }
        }
    </script>
</body>
